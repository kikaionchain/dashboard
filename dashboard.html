<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — Kikai</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #e5e5e5; font-family: -apple-system, 'SF Pro', 'Inter', sans-serif; padding: 24px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.5px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 24px; }
  .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .column { background: #111; border-radius: 12px; padding: 16px; min-height: 300px; }
  .column-header { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .count { background: #222; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: #888; }
  .card { background: #1a1a1a; border: 1px solid #262626; border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: default; transition: border-color 0.15s; }
  .card:hover { border-color: #444; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #222; color: #888; }
  .priority-high { border-left: 3px solid #ff6000; }
  .priority-medium { border-left: 3px solid #ffb800; }
  .priority-low { border-left: 3px solid #39ff14; }
  .assignee { font-size: 10px; color: #666; margin-top: 6px; }
  .col-backlog .column-header { color: #888; }
  .col-progress .column-header { color: #00d9ff; }
  .col-review .column-header { color: #ffb800; }
  .col-done .column-header { color: #39ff14; }
  .status-bar { display: flex; gap: 16px; margin-bottom: 24px; }
  .stat { background: #111; border-radius: 8px; padding: 12px 16px; flex: 1; }
  .stat-value { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .empty { color: #333; font-size: 12px; font-style: italic; padding: 20px 0; text-align: center; }
</style>
</head>
<body>

<h1>Mission Control</h1>
<p class="subtitle" id="timestamp"></p>

<div class="status-bar" id="stats"></div>
<div class="board" id="board"></div>

<script>
const TASKS = __TASKS_JSON__;

function render() {
  const cols = { backlog: [], 'in-progress': [], review: [], done: [] };
  TASKS.forEach(t => { if (cols[t.status]) cols[t.status].push(t); });

  document.getElementById('timestamp').textContent = 'Last updated: ' + new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' });

  document.getElementById('stats').innerHTML = [
    { label: 'Backlog', value: cols.backlog.length },
    { label: 'In Progress', value: cols['in-progress'].length },
    { label: 'Review', value: cols.review.length },
    { label: 'Done', value: cols.done.length },
  ].map(s => `<div class="stat"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('');

  const colMeta = [
    { key: 'backlog', label: 'Backlog', cls: 'col-backlog' },
    { key: 'in-progress', label: 'In Progress', cls: 'col-progress' },
    { key: 'review', label: 'Review', cls: 'col-review' },
    { key: 'done', label: 'Done', cls: 'col-done' },
  ];

  document.getElementById('board').innerHTML = colMeta.map(c => {
    const cards = cols[c.key];
    return `<div class="column ${c.cls}">
      <div class="column-header">${c.label} <span class="count">${cards.length}</span></div>
      ${cards.length === 0 ? '<div class="empty">No tasks</div>' : cards.map(t => `
        <div class="card priority-${t.priority || 'medium'}">
          <div class="card-title">${t.title}</div>
          <div class="card-meta">
            ${(t.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>
          ${t.assigned ? `<div class="assignee">→ ${t.assigned}</div>` : ''}
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
