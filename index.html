<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --border: #38383a;
    --text: #ffffff;
    --text2: rgba(235,235,245,0.6);
    --text3: rgba(235,235,245,0.3);
    --blue: #0a84ff;
    --green: #30d158;
    --amber: #ff9f0a;
    --red: #ff453a;
    --purple: #bf5af2;
    --teal: #5ac8fa;
  }

  html { background: var(--bg); color: var(--text); }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    background: var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 80px;
  }

  /* ── ANIMATIONS ─────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .fade { animation: fadeUp 0.3s ease both; }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
  }

  .header-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .header-meta {
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--blue);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: inherit;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: rgba(10,132,255,0.12); }

  /* ── QUICK ACCESS ────────────────────────────── */
  .qa-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px;
    color: var(--text2); font-size: 12px; font-weight: 500;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    letter-spacing: 0.01em;
  }
  .qa-link:hover { border-color: #555; color: var(--text); background: var(--surface2); }
  .qa-link .qa-icon { font-size: 14px; }
  .qa-link .qa-badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    letter-spacing: 0.06em; text-transform: uppercase; margin-left: 2px;
  }
  .qa-badge-live { background: rgba(48,209,88,0.15); color: var(--green); }
  .qa-badge-new { background: rgba(10,132,255,0.15); color: var(--blue); }
  .qa-badge-draft { background: rgba(255,159,10,0.12); color: var(--amber); }

  /* ── BUSINESSES ──────────────────────────────── */
  .biz-stats-strip {
    display: flex; gap: 2px; padding: 0 24px; max-width: 960px; margin: 0 auto 2px;
    flex-wrap: wrap;
  }
  .biz-stat {
    flex: 1; min-width: 120px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px;
  }
  .biz-stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
  .biz-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  .biz-pipeline {
    max-width: 960px; margin: 0 auto; padding: 12px 24px 16px;
    display: flex; align-items: center; gap: 6px;
  }
  .biz-pipe-segment {
    height: 6px; border-radius: 3px; transition: width 0.4s ease;
  }
  .biz-pipe-label {
    font-size: 10px; color: var(--text3); letter-spacing: 0.06em; margin-left: 6px; white-space: nowrap;
  }

  .biz-grid {
    max-width: 960px; margin: 0 auto; padding: 0 24px 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
  }

  .biz-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .biz-card:hover { border-color: #555; }
  .biz-card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }

  .biz-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .biz-card-name { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .biz-card-price { font-size: 13px; font-weight: 600; color: var(--green); }

  .biz-card-meta { font-size: 11px; color: var(--text3); margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
  .biz-card-aesthetic {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    border: 1px solid var(--border); color: var(--text2); letter-spacing: 0.02em;
  }
  .biz-card-seller { font-size: 11px; color: var(--text3); font-style: italic; margin-bottom: 12px; }

  .biz-card-status {
    display: inline-block; font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 4px;
  }
  .biz-card-status.draft { background: rgba(255,159,10,0.12); color: var(--amber); }
  .biz-card-status.listed { background: rgba(48,209,88,0.12); color: var(--green); }
  .biz-card-status.live { background: rgba(48,209,88,0.2); color: var(--green); }
  .biz-card-status.paused { background: rgba(235,235,245,0.08); color: var(--text3); }

  .biz-readiness { display: flex; gap: 4px; margin-top: 12px; }
  .biz-readiness-dot {
    width: 8px; height: 8px; border-radius: 50%; border: 1px solid var(--border);
    position: relative;
  }
  .biz-readiness-dot.done { background: var(--green); border-color: var(--green); }
  .biz-readiness-dot.pending { background: transparent; }

  .biz-readiness-labels { display: flex; gap: 4px; margin-top: 4px; }
  .biz-readiness-lbl { font-size: 8px; color: var(--text3); text-align: center; width: 8px; overflow: visible; white-space: nowrap; }

  .biz-metrics-row { display: flex; gap: 16px; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .biz-metric { flex: 1; }
  .biz-metric-val { font-size: 14px; font-weight: 700; color: var(--text); }
  .biz-metric-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

  .done-btn {
    margin-left: auto;
    margin-right: 8px;
    background: rgba(48,209,88,0.1);
    border: 1px solid rgba(48,209,88,0.25);
    color: var(--green);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    padding: 3px 10px;
    border-radius: 6px;
    font-family: inherit;
    letter-spacing: 0.02em;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .done-btn:hover { background: rgba(48,209,88,0.2); border-color: rgba(48,209,88,0.5); }

  .action-card-header { display: flex; align-items: center; gap: 10px; }

  /* ── LAUNCH STATUS BAR ──────────────────────────── */
  #launch-bar {
    padding: 0 24px;
    margin-bottom: 0;
  }

  .launch-alert {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    margin: 16px 0 0 0;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(255,159,10,0.15) 0%, rgba(255,69,58,0.12) 100%);
    border: 1px solid rgba(255,159,10,0.3);
    animation: fadeUp 0.3s ease both;
  }

  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  .launch-alert-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--amber);
    flex: 1;
  }

  .launch-alert-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 1px;
  }

  .launch-count {
    font-size: 28px;
    font-weight: 700;
    color: var(--amber);
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── MAIN LAYOUT ────────────────────────────────── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── SECTION LABELS ─────────────────────────────── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin: 32px 0 12px 0;
  }

  /* ── CARD ───────────────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  /* ── WJP ACTION ITEMS ───────────────────────────── */
  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 600px) {
    .action-grid { grid-template-columns: 1fr; }
  }

  .action-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 16px 18px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    animation: fadeUp 0.3s ease both;
    user-select: none;
  }
  .action-card:hover {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.12);
  }
  .action-card.critical { border-left: 3px solid var(--red); }
  .action-card.normal   { border-left: 3px solid var(--amber); }

  .action-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .priority-dot.critical { background: var(--red); }
  .priority-dot.normal   { background: var(--amber); }

  .action-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .effort-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 6px;
    white-space: nowrap;
  }

  .action-detail {
    font-size: 13px;
    color: var(--text2);
    padding-left: 18px;
    line-height: 1.4;
  }

  .action-fix {
    display: none;
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 12px;
    color: var(--teal);
    font-family: "SF Mono", "Menlo", monospace;
    line-height: 1.5;
    word-break: break-word;
  }
  .action-card.open .action-fix { display: block; }

  .action-chevron {
    display: inline-block;
    width: 14px;
    height: 14px;
    color: var(--text3);
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .action-card.open .action-chevron { transform: rotate(90deg); }

  /* ── AGENT STATUS ───────────────────────────────── */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  @media (max-width: 500px) {
    .agent-grid { grid-template-columns: 1fr; }
  }

  .agent-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 20px;
    animation: fadeUp 0.3s ease both;
  }

  .agent-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .agent-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }

  .agent-avatar-fallback {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .agent-info { flex: 1; min-width: 0; }

  .agent-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .agent-role {
    font-size: 12px;
    color: var(--text3);
    margin-top: 1px;
  }

  .status-pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .status-pill.active  { background: rgba(48,209,88,0.15);  color: var(--green); }
  .status-pill.idle    { background: rgba(255,159,10,0.12); color: var(--amber); }
  .status-pill.offline { background: rgba(255,69,58,0.12);  color: var(--red);   }

  .status-pill-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .status-pill.active .status-pill-dot { animation: pulse 2s ease-in-out infinite; }

  .agent-task {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 12px;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .context-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 5px;
  }

  .context-bar-bg {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .context-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .context-bar-fill.green  { background: var(--green); }
  .context-bar-fill.amber  { background: var(--amber); }
  .context-bar-fill.red    { background: var(--red);   }

  /* ── HEALTH STRIP ───────────────────────────────── */
  .health-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .health-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    white-space: nowrap;
    animation: fadeUp 0.3s ease both;
  }

  .health-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .health-dot.green  { background: var(--green); }
  .health-dot.red    { background: var(--red);   }
  .health-dot.amber  { background: var(--amber); }

  .health-dot.live { animation: pulse 2.5s ease-in-out infinite; }

  /* ── QA FEED ────────────────────────────────────── */
  .qa-list {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .qa-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.3s ease both;
  }
  .qa-row:last-child { border-bottom: none; }

  .qa-date {
    font-size: 11px;
    color: var(--text3);
    width: 44px;
    flex-shrink: 0;
  }

  .qa-name {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .qa-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .qa-badge.PASS    { background: rgba(48,209,88,0.15);  color: var(--green); }
  .qa-badge.FAIL    { background: rgba(255,69,58,0.12);  color: var(--red);   }
  .qa-badge.PARTIAL { background: rgba(255,159,10,0.12); color: var(--amber); }
  .qa-badge.FIXED   { background: rgba(10,132,255,0.12); color: var(--blue);  }

  .qa-runner {
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
    min-width: 80px;
    text-align: right;
  }

  /* ── PROJECTS ───────────────────────────────────── */
  .project-list {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  .project-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .project-row:last-child { border-bottom: none; }

  .project-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .project-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    width: 80px;
    flex-shrink: 0;
  }

  .project-status-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .project-desc {
    font-size: 12px;
    color: var(--text3);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── INTEL FEED ─────────────────────────────────── */
  /* ── PHASE 2 STYLES ─────────────────────────────────────────── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }
  .skill-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn 0.3s ease both;
  }
  .skill-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text1);
  }
  .skill-status {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    width: fit-content;
  }
  .skill-status.live { background: rgba(34,197,94,0.15); color: #22c55e; }
  .skill-status.parked { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .skill-status.building { background: rgba(99,102,241,0.15); color: #6366f1; }
  .skill-meta { font-size: 11px; color: var(--text3); }

  .activity-feed {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .activity-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease both;
  }
  .activity-row:last-child { border-bottom: none; }
  .activity-agent {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    min-width: 44px;
    text-align: center;
  }
  .activity-agent.kikai { background: rgba(251,113,133,0.15); color: #fb7185; }
  .activity-agent.yama { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .activity-agent.kodo { background: rgba(99,102,241,0.15); color: #818cf8; }
  .activity-text { font-size: 13px; color: var(--text1); flex: 1; }
  .activity-time { font-size: 11px; color: var(--text3); white-space: nowrap; }

  .wjp-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .wjp-stat-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 4px;
  }
  .wjp-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    animation: fadeIn 0.3s ease both;
  }
  .wjp-stat-value {
    font-size: 22px;
    font-weight: 700;
    color: var(--text1);
    line-height: 1.2;
  }
  .wjp-stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .wjp-blockers {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .wjp-blocker-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease both;
  }
  .wjp-blocker-row:last-child { border-bottom: none; }
  .wjp-blocker-label {
    font-size: 11px;
    font-weight: 700;
    color: #f87171;
    background: rgba(248,113,113,0.12);
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .wjp-blocker-text { font-size: 13px; color: var(--text1); }
  .wjp-section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 6px 14px 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    border-bottom: none;
  }

  .intel-list {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  .intel-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .intel-row:last-child { border-bottom: none; }

  .intel-date {
    font-size: 11px;
    color: var(--text3);
    width: 44px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .intel-title {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }

  .intel-action {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  .impact-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .impact-badge.high { background: rgba(255,69,58,0.12);  color: var(--red);   }
  .impact-badge.medium { background: rgba(255,159,10,0.12); color: var(--amber); }

  /* ── ACTIVE WORK ────────────────────────────────── */
  .active-work-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  .active-work-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 18px 20px;
    animation: fadeUp 0.3s ease both;
  }

  .active-work-card.blocked { border-left: 3px solid var(--red); }
  .active-work-card.idle    { opacity: 0.6; }

  .aw-agent-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .aw-agent-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .aw-status-pill {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 10px;
  }
  .aw-status-pill.IN_PROGRESS { background: rgba(10,132,255,0.15); color: var(--blue); }
  .aw-status-pill.BLOCKED     { background: rgba(255,69,58,0.15);  color: var(--red); }
  .aw-status-pill.COMPLETE    { background: rgba(48,209,88,0.15);  color: var(--green); }
  .aw-status-pill.IDLE        { background: rgba(235,235,245,0.08); color: var(--text3); }

  .aw-task-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .aw-task-meta {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 12px;
  }

  .aw-progress-bar-bg {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .aw-progress-bar-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .aw-progress-label {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    text-align: right;
  }

  /* ── RECENT OUTPUTS ──────────────────────────────── */
  .outputs-list {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .output-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.3s ease both;
  }
  .output-row:last-child { border-bottom: none; }

  .output-date {
    font-size: 11px;
    color: var(--text3);
    width: 44px;
    flex-shrink: 0;
  }

  .output-name {
    font-size: 12px;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: "SF Mono", "Menlo", monospace;
  }

  .output-agent {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  .output-agent.kodo  { background: rgba(191,90,242,0.15); color: var(--purple); }
  .output-agent.kikai { background: rgba(48,209,88,0.12);  color: var(--green); }
  .output-agent.yama  { background: rgba(90,200,250,0.12); color: var(--teal); }

  .output-size {
    font-size: 10px;
    color: var(--text3);
    flex-shrink: 0;
    width: 36px;
    text-align: right;
  }

  /* ── CRON JOBS ───────────────────────────────────── */
  .cron-table {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .cron-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.3s ease both;
  }
  .cron-row:last-child { border-bottom: none; }
  .cron-row.header { background: var(--surface2); }

  .cron-name {
    font-size: 12px;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cron-schedule {
    font-size: 11px;
    color: var(--text3);
    width: 70px;
    flex-shrink: 0;
    font-family: "SF Mono", "Menlo", monospace;
  }

  .cron-last {
    font-size: 11px;
    color: var(--text3);
    width: 72px;
    flex-shrink: 0;
    text-align: right;
  }

  .cron-status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cron-status-dot.ok    { background: var(--green); }
  .cron-status-dot.error { background: var(--red); animation: pulse 1.5s ease-in-out infinite; }
  .cron-status-dot.stale { background: var(--amber); }

  /* ── LOADING STATE ──────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
    height: 14px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── SPINNER ────────────────────────────────────── */
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">Mission Control</div>
  <div class="header-meta">
    <span id="last-updated">—</span>

<!-- LAUNCH STATUS BAR -->

<!-- MAIN -->
<main>

  <div id="active-work-section" style="display:none;">

  <!-- FOR CRYPTO HEALTH -->

  <!-- BUSINESSES -->

  <!-- Pipeline -->

  <!-- QA FEED -->

  <!-- TASK QUEUE -->

  <!-- RECENT OUTPUTS -->

    <div class="outputs-list" id="outputs-list"></div>

  <!-- SKILLS INVENTORY -->

    <div id="skills-grid"></div>
  </div>

  <!-- TEAM ACTIVITY FEED -->

    <div id="activity-feed"></div>

  <!-- WJP DASHBOARD -->

  <!-- INTEL -->

</main>

<script>
// ── HARDCODED DATA ──────────────────────────────────────────────────────────

const NEEDS_WJP = [
  { id: 'vite-app-url', priority: 'critical', title: 'Set VITE_APP_URL in Vercel', detail: 'Production env var missing — codebase still references localhost in some paths', effort: '2 min',
    fix: 'vercel.com → For Crypto → Settings → Environment Variables → VITE_APP_URL = https://forcrypto.market' },
  { id: 'database-url', priority: 'critical', title: 'Add DATABASE_URL to Vercel', detail: 'Bot API auth fails silently without this — wallet connect broken in production', effort: '2 min',
    fix: 'vercel.com → For Crypto → Settings → Environment Variables → DATABASE_URL' },

  { id: 'google-tos', priority: 'normal', title: 'Accept Google AI Studio TOS', detail: 'Blocks Nano Banana (Imagen 3) image generation — TOS pending on kikaionchain@gmail.com', effort: '1 min',
    fix: 'aistudio.google.com → sign in as kikaionchain@gmail.com → accept terms' },
];

const QA = [
  { date: 'Mar 1', name: 'Embed external site — X-Frame-Options', result: 'FIXED',   runner: 'Yama' },
  { date: 'Mar 1', name: 'Frontend QA — hero, nav, marketplace',   result: 'PARTIAL', runner: 'Yama' },
  { date: 'Mar 1', name: 'Embed checkout modal',                    result: 'PASS',    runner: 'Yama' },
  { date: 'Feb 28', name: 'E2E Suite Phase A-C (52 tests)',         result: 'PASS',    runner: 'Kikai + Yama' },
  { date: 'Feb 26', name: 'Bot API endpoint verification',          result: 'PASS',    runner: 'Kikai' },
];

// ── PHASE 1 RENDER FUNCTIONS ────────────────────────────────────────────────

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return Math.round(bytes/1024) + 'K';
  return (bytes/(1024*1024)).toFixed(1) + 'M';
}

function fmtOutputDate(isoStr) {
  const d = new Date(isoStr);
  return `${d.toLocaleString('en',{month:'short'})} ${d.getDate()}`;
}

function renderActiveWork(activeWork, updatedAt) {
  const section = document.getElementById('active-work-section');
  const grid = document.getElementById('active-work-grid');
  if (!activeWork || !activeWork.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  if (updatedAt) {
    const d = new Date(updatedAt);
    document.getElementById('active-work-updated').textContent =
      `updated ${d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}`;
  }
  grid.innerHTML = activeWork.map((agent, i) => {
    const task = agent.task || {};
    const statusClass = task.status || 'IDLE';
    const isIdle = statusClass === 'IDLE' || statusClass === 'COMPLETE';
    const isBlocked = statusClass === 'BLOCKED';
    const taskName = task.name || 'Available';
    const pct = task.progress_percent || 0;
    const meta = task.startedAt ? `Started ${task.startedAt}` : '';
    const blockedNote = isBlocked && task.blockedOn ? `⚠️ ${task.blockedOn}` : '';

    return `
      <div class="active-work-card ${isBlocked ? 'blocked' : ''} ${isIdle ? 'idle' : ''}" style="animation-delay:${i*60}ms">
        <div class="aw-agent-row">
          <span class="aw-agent-name">${agent.name}</span>
          <span class="aw-status-pill ${statusClass}">${statusClass.replace('_',' ')}</span>
        </div>
        <div class="aw-task-name">${taskName}</div>
        ${meta ? `<div class="aw-task-meta">${meta}</div>` : ''}
        ${blockedNote ? `<div class="aw-task-meta" style="color:var(--red)">${blockedNote}</div>` : ''}
        ${!isIdle ? `
          <div class="aw-progress-bar-bg">
            <div class="aw-progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="aw-progress-label">${pct}%</div>
        ` : ''}
      </div>`;
  }).join('');
}

function renderRecentOutputs(outputs, updatedAt) {
  const section = document.getElementById('outputs-section');
  const list = document.getElementById('outputs-list');
  const count = document.getElementById('outputs-count');
  if (!outputs || !outputs.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  count.textContent = `(${outputs.length})`;
  if (updatedAt) {
    const d = new Date(updatedAt);
    document.getElementById('outputs-updated').textContent =
      `updated ${d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}`;
  }
  list.innerHTML = outputs.map((o, i) => `
    <div class="output-row" style="animation-delay:${i*30}ms">
      <span class="output-date">${fmtOutputDate(o.createdAt)}</span>
      <span class="output-name">${o.filename}</span>
      <span class="output-agent ${o.agent}">${o.agent}</span>
      <span class="output-size">${fmtSize(o.size)}</span>
    </div>`).join('');
}

function renderCronJobs(jobs, updatedAt) {
  const section = document.getElementById('cron-section');
  const table = document.getElementById('cron-table');
  const count = document.getElementById('cron-count');
  if (!jobs || !jobs.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  const ok = jobs.filter(j => j.status === 'ok').length;
  const err = jobs.filter(j => j.status === 'error').length;
  count.textContent = `(${ok} ok${err > 0 ? `, ${err} err` : ''})`;
  if (updatedAt) {
    const d = new Date(updatedAt);
    document.getElementById('cron-updated').textContent =
      `updated ${d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}`;
  }
  table.innerHTML = jobs.map((j, i) => `
    <div class="cron-row" style="animation-delay:${i*30}ms">
      <span class="cron-status-dot ${j.status}"></span>
      <span class="cron-name">${j.name}</span>
      <span class="cron-schedule">${j.schedule}</span>
      <span class="cron-last">${j.lastRunAgo}</span>
    </div>`).join('');
}

// ── DATA FETCH ──────────────────────────────────────────────────────────────

const BASE = window.location.origin.includes('github.io')
  ? '/mission-control/data.json'
  : 'data.json';

const KODO_BASE = window.location.origin.includes('github.io')
  ? '/mission-control/data/kodo.json'
  : 'data/kodo.json';

let DATA = null;
let KODO_DATA = null;

async function fetchData() {
  const res = await fetch(BASE + '?_v=' + Date.now());
  DATA = await res.json();
  return DATA;
}

async function fetchKodoData() {
  try {
    const res = await fetch(KODO_BASE + '?_v=' + Date.now());
    KODO_DATA = await res.json();
    return KODO_DATA;
  } catch { return null; }
}

async function fetchAgentJson(agent) {
  const base = window.location.origin.includes('github.io') ? '/mission-control/' : '';
  try {
    const res = await fetch(`${base}data/${agent}.json?_v=${Date.now()}`);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function fetchCronsJson() {
  const base = window.location.origin.includes('github.io') ? '/mission-control/' : '';
  try {
    const res = await fetch(`${base}data/crons.json?_v=${Date.now()}`);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

function buildActiveWork(data, kodoData) {
  const result = [];

  // Kikai
  if (data && data.agents && data.agents.kikai) {
    const k = data.agents.kikai;
    result.push({
      name: 'Kikai',
      task: { name: k.workingOn || 'Available', status: k.status === 'active' ? 'IN_PROGRESS' : 'IDLE', progress_percent: 0 }
    });
  }

  // Yama
  if (data && data.agents && data.agents.yama) {
    const y = data.agents.yama;
    result.push({
      name: 'Yama',
      task: { name: y.workingOn || 'Available', status: y.status === 'active' ? 'IN_PROGRESS' : 'IDLE', progress_percent: 0 }
    });
  }

  // Kodo
  if (kodoData && kodoData.activeTask) {
    result.push({ name: 'Kodo', task: kodoData.activeTask });
  } else {
    result.push({ name: 'Kodo', task: { name: 'Available', status: 'IDLE', progress_percent: 0 } });
  }

  return result;
}

function buildCronJobs(data, kodoData, cronsJson) {
  const jobs = [];
  // Prefer dedicated crons.json pushed by Kikai's machine
  if (cronsJson && cronsJson.jobs && cronsJson.jobs.length) {
    cronsJson.jobs.forEach(j => jobs.push(j));
    return jobs;
  }
  // Fallback: merge from individual agent JSONs
  if (kodoData && kodoData.cronJobs) {
    kodoData.cronJobs.forEach(j => jobs.push({ ...j, machine: 'kodo' }));
  }
  if (data && data.cronJobs) {
    data.cronJobs.forEach(j => jobs.push({ ...j, machine: 'kikai' }));
  }
  return jobs;
}

function buildRecentOutputs(data, agentJsons) {
  const outputs = [];
  // Pull from all agent JSONs (kodo, kikai, yama)
  agentJsons.forEach(a => {
    if (a && a.recentOutputs) a.recentOutputs.forEach(o => outputs.push(o));
  });
  // Also pull from legacy data.json recentOutputs if present
  if (data && data.recentOutputs) {
    data.recentOutputs.forEach(o => outputs.push(o));
  }
  // Deduplicate by filename
  const seen = new Set();
  const deduped = outputs.filter(o => {
    if (seen.has(o.name)) return false;
    seen.add(o.name);
    return true;
  });
  deduped.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  return deduped.slice(0, 20);
}

// ── RENDER ──────────────────────────────────────────────────────────────────

function renderLaunchBar() {
  const dismissed = getDismissed();
  const critical = NEEDS_WJP.filter(i => i.priority === 'critical' && !dismissed.includes(i.id)).length;
  const bar = document.getElementById('launch-bar');
  if (critical === 0) { bar.innerHTML = ''; return; }
  bar.innerHTML = `
    <div class="launch-alert">
      <span class="launch-count">${critical}</span>
      <div>
        <div class="launch-alert-text">item${critical > 1 ? 's' : ''} need WJP before launch</div>
        <div class="launch-alert-sub">March 3 target — ${critical} critical block${critical > 1 ? 'ers' : 'er'} remaining</div>
      </div>
      <span class="pulse-dot"></span>
    </div>`;
}

function getDismissed() {
  try { return JSON.parse(localStorage.getItem('mc_dismissed') || '[]'); } catch { return []; }
}
function dismiss(id) {
  const d = getDismissed();
  if (!d.includes(id)) d.push(id);
  localStorage.setItem('mc_dismissed', JSON.stringify(d));
  renderWjpGrid();
  renderLaunchBar();
}

function renderWjpGrid() {
  const grid = document.getElementById('wjp-grid');
  const dismissed = getDismissed();
  const visible = NEEDS_WJP.filter(i => !dismissed.includes(i.id));

  if (visible.length === 0) {
    grid.innerHTML = `<div style="padding:24px 20px;color:var(--text3);font-size:13px;text-align:center;">
      ✅ All clear — nothing needs WJP right now
      <br><button onclick="localStorage.removeItem('mc_dismissed');renderWjpGrid();renderLaunchBar();"

function renderTeamActivity(data, allAgentJsons, updatedAt) {
  const section = document.getElementById('activity-section');
  const events = [];

  allAgentJsons.forEach(a => {
    if (!a) return;
    const name = a.agent || 'unknown';
    if (a.activeTask && a.activeTask.name && a.activeTask.status !== 'IDLE') {
      events.push({ agent: name, text: a.activeTask.name, ts: a.lastActiveMs, type: 'task' });
    }
    if (a.recentOutputs) {
      a.recentOutputs.slice(0, 2).forEach(o => {
        events.push({ agent: name, text: `Delivered: ${o.filename}`, ts: new Date(o.createdAt).getTime(), type: 'output' });
      });
    }
  });

  if (!events.length) { section.style.display = 'none'; return; }
  section.style.display = '';

  events.sort((a, b) => (b.ts || 0) - (a.ts || 0));
  const recent = events.slice(0, 8);

  if (updatedAt) {
    const d = new Date(updatedAt);
    document.getElementById('activity-updated').textContent =
      `updated ${d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}`;
  }

  const feed = document.getElementById('activity-feed');
  feed.className = 'activity-feed';
  feed.innerHTML = recent.map((e, i) => {
    const ago = e.ts ? fmtAgo(e.ts) : '—';
    return `<div class="activity-row" style="animation-delay:${i*40}ms">
      <span class="activity-agent ${e.agent}">${e.agent}</span>
      <span class="activity-text">${e.text}</span>

}

function fmtAgo(ms) {
  if (!ms) return '—';
  const diff = Date.now() - ms;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.round(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.round(diff/3600000)}h ago`;
  return `${Math.round(diff/86400000)}d ago`;
}

function renderIntel(intel) {
  const list = document.getElementById('intel-list');
  if (!intel || !intel.length) { list.innerHTML = '<div style="padding:20px;color:var(--text3);font-size:13px;">No intel</div>'; return; }
  const valid = intel.filter(i => {
    if (!i.title && !i.text) return false;
    const d = new Date(i.date || i.time);
    return !isNaN(d.getTime());
  });
  if (!valid.length) { list.innerHTML = '<div style="padding:20px;color:var(--text3);font-size:13px;">No intel</div>'; return; }
  list.innerHTML = valid.slice(0, 4).map((item, i) => {
    const d = new Date(item.date || item.time);
    const label = `${d.toLocaleString('en', {month:'short'})} ${d.getDate()}`;
    return `
      <div class="intel-row" style="animation-delay:${i * 60}ms">
        <span class="intel-date">${label}</span>
        <div class="intel-title">
          ${item.title || item.text}
          ${item.action ? `<div class="intel-action">${item.action}</div>` : ''}
        </div>
        <span class="impact-badge ${item.impact || 'medium'}">${(item.impact || 'med').toUpperCase()}</span>
      </div>`;
  }).join('');
}

function fmtDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return `${d.toLocaleString('en', {month:'short'})} ${d.getDate()}`;
}

function updateTimestamp(updatedAt) {
  const el = document.getElementById('last-updated');
  if (updatedAt) {
    const d = new Date(updatedAt);
    el.textContent = `Updated ${d.toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'})}`;

    el.textContent = `Loaded ${new Date().toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'})}`;
  }
}

async function refreshData() {
  document.getElementById('last-updated').innerHTML = '<span class="spinner"></span>';
  try {
    const [data, kodoData, kikaiJson, yamaJson, cronsJson] = await Promise.all([
      fetchData(), fetchKodoData(),
      fetchAgentJson('kikai'), fetchAgentJson('yama'), fetchCronsJson()
    ]);
    const domainLive = data.health && data.health.domain === 'live';
    updateTimestamp(data.updatedAt);

    // Merge Kodo into agents for existing agent grid
    const mergedAgents = {
      ...(data.agents || {}),
      kodo: kodoData ? {
        status: kodoData.status,
        workingOn: kodoData.activeTask?.name || 'idle',
        contextPct: 0,
        model: 'claude-sonnet-4-6',
        lastActivityMin: kodoData.lastActiveMs ? Math.round((Date.now() - kodoData.lastActiveMs) / 60000) : null,
        rateLimit: false
      } : {}
    };

    renderAgents(mergedAgents);
    renderHealth(data.health || {}, domainLive);
    renderProjects(data.projects);
    renderTaskQueue(data.taskQueue);
    renderIntel(data.intel);

    // Phase 1 panels
    const kodoTs = kodoData ? kodoData.updatedAt : null;
    const allAgentJsons = [kodoData, kikaiJson, yamaJson].filter(Boolean);
    renderActiveWork(buildActiveWork(data, kodoData), kodoTs);
    renderRecentOutputs(buildRecentOutputs(data, allAgentJsons), kodoTs);
    renderCronJobs(buildCronJobs(data, kodoData, cronsJson), kodoTs);

    // Phase 2 panels
    const globalTs = data.updatedAt || kodoTs;
    renderSkillsInventory(allAgentJsons, kodoTs);
    renderTeamActivity(data, allAgentJsons, globalTs);
    renderWjpDashboard(data, allAgentJsons, globalTs);

  } catch (e) {
    document.getElementById('last-updated').textContent = 'Fetch failed';
    console.error(e);
  }
}

  renderLaunchBar();
  renderWjpGrid();
  renderQA();

  // Fetch remote data
  await Promise.all([refreshData(), renderBusinesses()]);

  // Auto-refresh every 60s
  setInterval(() => { refreshData(); renderBusinesses(); }, 60_000);
}

init();
</script>
