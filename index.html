<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --border: #38383a;
    --text: #ffffff;
    --text2: rgba(235,235,245,0.6);
    --text3: rgba(235,235,245,0.3);
    --blue: #0a84ff;
    --green: #30d158;
    --amber: #ff9f0a;
    --red: #ff453a;
    --purple: #bf5af2;
    --teal: #5ac8fa;
  }

  html { background: var(--bg); color: var(--text); }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    background: var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 80px;
  }

  /* ── ANIMATIONS ─────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .fade { animation: fadeUp 0.3s ease both; }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
  }

  .header-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .header-meta {
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--blue);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: inherit;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: rgba(10,132,255,0.12); }

  /* ── LAUNCH STATUS BAR ──────────────────────────── */
  #launch-bar {
    padding: 0 24px;
    margin-bottom: 0;
  }

  .launch-alert {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    margin: 16px 0 0 0;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(255,159,10,0.15) 0%, rgba(255,69,58,0.12) 100%);
    border: 1px solid rgba(255,159,10,0.3);
    animation: fadeUp 0.3s ease both;
  }

  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  .launch-alert-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--amber);
    flex: 1;
  }

  .launch-alert-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 1px;
  }

  .launch-count {
    font-size: 28px;
    font-weight: 700;
    color: var(--amber);
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── MAIN LAYOUT ────────────────────────────────── */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── SECTION LABELS ─────────────────────────────── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin: 32px 0 12px 0;
  }

  /* ── CARD ───────────────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  /* ── WJP ACTION ITEMS ───────────────────────────── */
  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 600px) {
    .action-grid { grid-template-columns: 1fr; }
  }

  .action-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 16px 18px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    animation: fadeUp 0.3s ease both;
    user-select: none;
  }
  .action-card:hover {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.12);
  }
  .action-card.critical { border-left: 3px solid var(--red); }
  .action-card.normal   { border-left: 3px solid var(--amber); }

  .action-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .priority-dot.critical { background: var(--red); }
  .priority-dot.normal   { background: var(--amber); }

  .action-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .effort-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 7px;
    border-radius: 6px;
    white-space: nowrap;
  }

  .action-detail {
    font-size: 13px;
    color: var(--text2);
    padding-left: 18px;
    line-height: 1.4;
  }

  .action-fix {
    display: none;
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 12px;
    color: var(--teal);
    font-family: "SF Mono", "Menlo", monospace;
    line-height: 1.5;
    word-break: break-word;
  }
  .action-card.open .action-fix { display: block; }

  .action-chevron {
    display: inline-block;
    width: 14px;
    height: 14px;
    color: var(--text3);
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .action-card.open .action-chevron { transform: rotate(90deg); }

  /* ── AGENT STATUS ───────────────────────────────── */
  .agent-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 500px) {
    .agent-grid { grid-template-columns: 1fr; }
  }

  .agent-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 20px;
    animation: fadeUp 0.3s ease both;
  }

  .agent-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .agent-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }

  .agent-avatar-fallback {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .agent-info { flex: 1; min-width: 0; }

  .agent-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .agent-role {
    font-size: 12px;
    color: var(--text3);
    margin-top: 1px;
  }

  .status-pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .status-pill.active  { background: rgba(48,209,88,0.15);  color: var(--green); }
  .status-pill.idle    { background: rgba(255,159,10,0.12); color: var(--amber); }
  .status-pill.offline { background: rgba(255,69,58,0.12);  color: var(--red);   }

  .status-pill-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }
  .status-pill.active .status-pill-dot { animation: pulse 2s ease-in-out infinite; }

  .agent-task {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 12px;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .context-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 5px;
  }

  .context-bar-bg {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .context-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .context-bar-fill.green  { background: var(--green); }
  .context-bar-fill.amber  { background: var(--amber); }
  .context-bar-fill.red    { background: var(--red);   }

  /* ── HEALTH STRIP ───────────────────────────────── */
  .health-strip {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .health-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    white-space: nowrap;
    animation: fadeUp 0.3s ease both;
  }

  .health-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .health-dot.green  { background: var(--green); }
  .health-dot.red    { background: var(--red);   }
  .health-dot.amber  { background: var(--amber); }

  .health-dot.live { animation: pulse 2.5s ease-in-out infinite; }

  /* ── QA FEED ────────────────────────────────────── */
  .qa-list {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .qa-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.3s ease both;
  }
  .qa-row:last-child { border-bottom: none; }

  .qa-date {
    font-size: 11px;
    color: var(--text3);
    width: 44px;
    flex-shrink: 0;
  }

  .qa-name {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .qa-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .qa-badge.PASS    { background: rgba(48,209,88,0.15);  color: var(--green); }
  .qa-badge.FAIL    { background: rgba(255,69,58,0.12);  color: var(--red);   }
  .qa-badge.PARTIAL { background: rgba(255,159,10,0.12); color: var(--amber); }
  .qa-badge.FIXED   { background: rgba(10,132,255,0.12); color: var(--blue);  }

  .qa-runner {
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
    min-width: 80px;
    text-align: right;
  }

  /* ── PROJECTS ───────────────────────────────────── */
  .project-list {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  .project-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .project-row:last-child { border-bottom: none; }

  .project-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .project-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    width: 80px;
    flex-shrink: 0;
  }

  .project-status-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .project-desc {
    font-size: 12px;
    color: var(--text3);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── INTEL FEED ─────────────────────────────────── */
  .intel-list {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }

  .intel-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .intel-row:last-child { border-bottom: none; }

  .intel-date {
    font-size: 11px;
    color: var(--text3);
    width: 44px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .intel-title {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }

  .intel-action {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  .impact-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .impact-badge.high { background: rgba(255,69,58,0.12);  color: var(--red);   }
  .impact-badge.medium { background: rgba(255,159,10,0.12); color: var(--amber); }

  /* ── LOADING STATE ──────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
    height: 14px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── SPINNER ────────────────────────────────────── */
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">Mission Control</div>
  <div class="header-meta">
    <span id="last-updated">—</span>
    <button class="refresh-btn" onclick="refreshData()">Refresh</button>
  </div>
</header>

<!-- LAUNCH STATUS BAR -->
<div id="launch-bar" style="max-width:960px;margin:0 auto;padding:0 24px;"></div>

<!-- MAIN -->
<main>

  <!-- WJP ACTION ITEMS -->
  <div class="section-label">Needs WJP</div>
  <div class="action-grid" id="wjp-grid"></div>

  <!-- AGENT STATUS -->
  <div class="section-label">Agents</div>
  <div class="agent-grid" id="agent-grid">
    <div class="agent-card"><div class="skeleton" style="height:80px;"></div></div>
    <div class="agent-card"><div class="skeleton" style="height:80px;"></div></div>
  </div>

  <!-- FOR CRYPTO HEALTH -->
  <div class="section-label">For Crypto</div>
  <div class="health-strip" id="health-strip">
    <div class="health-pill"><span class="spinner"></span> Checking…</div>
  </div>

  <!-- QA FEED -->
  <div class="section-label">QA Feed</div>
  <div class="qa-list" id="qa-list"></div>

  <!-- PROJECTS -->
  <div class="section-label">Projects</div>
  <div class="project-list" id="project-list">
    <div style="padding:20px;"><div class="skeleton"></div></div>
  </div>

  <!-- INTEL -->
  <div class="section-label">Intel</div>
  <div class="intel-list" id="intel-list">
    <div style="padding:20px;"><div class="skeleton"></div></div>
  </div>

</main>

<script>
// ── HARDCODED DATA ──────────────────────────────────────────────────────────

const NEEDS_WJP = [
  { priority: 'critical', title: 'Fix DNS', detail: 'forcrypto.market shows GoDaddy parking page', effort: '2 min',
    fix: 'GoDaddy → DNS → A: @ → 76.76.21.61, 76.76.21.98 | CNAME: www → cname.vercel-dns.com' },
  { priority: 'critical', title: 'Add DATABASE_URL', detail: 'Bot API broken on Vercel production', effort: '2 min',
    fix: 'vercel.com → For Crypto → Settings → Environment Variables → DATABASE_URL' },
  { priority: 'critical', title: 'Delete test listings', detail: '8 of 12 marketplace listings are dev test data', effort: '5 min',
    fix: 'for-crypto.vercel.app → sign in → manage listings → delete all test entries' },
  { priority: 'normal', title: 'Merge PR #18', detail: 'Hero bot messaging + nav fix — build passes', effort: '1 min',
    fix: 'github.com/00onchain/for-crypto/pull/18' },
  { priority: 'normal', title: 'Payout wallet address', detail: 'Needed for 60 microbusiness listings', effort: '1 min',
    fix: 'Share your AI business wallet Solana address' },
];

const QA = [
  { date: 'Mar 1', name: 'Embed external site — X-Frame-Options', result: 'FIXED',   runner: 'Yama' },
  { date: 'Mar 1', name: 'Frontend QA — hero, nav, marketplace',   result: 'PARTIAL', runner: 'Yama' },
  { date: 'Mar 1', name: 'Embed checkout modal',                    result: 'PASS',    runner: 'Yama' },
  { date: 'Feb 28', name: 'E2E Suite Phase A-C (52 tests)',         result: 'PASS',    runner: 'Kikai + Yama' },
  { date: 'Feb 26', name: 'Bot API endpoint verification',          result: 'PASS',    runner: 'Kikai' },
];

// ── DATA FETCH ──────────────────────────────────────────────────────────────

const BASE = window.location.origin.includes('github.io')
  ? '/mission-control/data.json'
  : 'data.json';

let DATA = null;

async function fetchData() {
  const res = await fetch(BASE + '?_v=' + Date.now());
  DATA = await res.json();
  return DATA;
}

// ── RENDER ──────────────────────────────────────────────────────────────────

function renderLaunchBar() {
  const critical = NEEDS_WJP.filter(i => i.priority === 'critical').length;
  const bar = document.getElementById('launch-bar');
  if (critical === 0) { bar.innerHTML = ''; return; }
  bar.innerHTML = `
    <div class="launch-alert">
      <span class="launch-count">${critical}</span>
      <div>
        <div class="launch-alert-text">item${critical > 1 ? 's' : ''} need WJP before launch</div>
        <div class="launch-alert-sub">March 3 target — ${critical} critical block${critical > 1 ? 'ers' : 'er'} remaining</div>
      </div>
      <span class="pulse-dot"></span>
    </div>`;
}

function renderWjpGrid() {
  const grid = document.getElementById('wjp-grid');
  grid.innerHTML = NEEDS_WJP.map((item, i) => `
    <div class="action-card ${item.priority}" style="animation-delay:${i * 60}ms" onclick="toggleAction(this)">
      <div class="action-card-header">
        <span class="priority-dot ${item.priority}"></span>
        <span class="action-title">${item.title}</span>
        <span class="effort-badge">${item.effort}</span>
        <svg class="action-chevron" viewBox="0 0 14 14" fill="none">
          <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="action-detail">${item.detail}</div>
      <div class="action-fix">${item.fix}</div>
    </div>`).join('');
}

function toggleAction(el) {
  el.classList.toggle('open');
}

function contextColor(pct) {
  if (pct < 60) return 'green';
  if (pct < 80) return 'amber';
  return 'red';
}

function statusPill(s) {
  const label = s === 'active' ? 'ACTIVE' : s === 'idle' ? 'IDLE' : 'OFFLINE';
  return `<span class="status-pill ${s}"><span class="status-pill-dot"></span>${label}</span>`;
}

function renderAgents(agents) {
  const grid = document.getElementById('agent-grid');
  const defs = [
    { key: 'kikai', name: 'Kikai', role: 'Operator', avatar: 'kikai-pfp.png', fallback: '🦊' },
    { key: 'yama',  name: 'Yama',  role: 'Tester',   avatar: 'yama-pfp.png',  fallback: '🐺' },
  ];

  grid.innerHTML = defs.map((d, i) => {
    const a = (agents && agents[d.key]) || {};
    const pct = a.contextPct || 0;
    const status = a.status || 'offline';
    const color = contextColor(pct);
    const task = a.workingOn || '—';
    return `
      <div class="agent-card" style="animation-delay:${i * 80}ms">
        <div class="agent-top">
          <div class="agent-avatar-fallback">${d.fallback}</div>
          <div class="agent-info">
            <div class="agent-name">${d.name} ${statusPill(status)}</div>
            <div class="agent-role">${d.role}</div>
          </div>
        </div>
        <div class="agent-task">${task}</div>
        <div class="context-label">
          <span>Context</span>
          <span>${pct}%</span>
        </div>
        <div class="context-bar-bg">
          <div class="context-bar-fill ${color}" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');
}

function renderHealth(health, domainLive) {
  const strip = document.getElementById('health-strip');

  const domain = domainLive
    ? `<span class="health-dot green live"></span> Domain LIVE`
    : `<span class="health-dot red"></span> Domain DOWN`;

  const botStatus = health.botApi === 'live'
    ? `<span class="health-dot green live"></span> Bot API LIVE`
    : `<span class="health-dot red"></span> Bot API DOWN`;

  const e2e = `<span class="health-dot green"></span> E2E ${health.e2eTests || '52/52'}`;

  const deploy = health.lastDeploy
    ? `<span class="health-dot green"></span> Deployed ${fmtDate(health.lastDeploy)}`
    : `<span class="health-dot amber"></span> No deploy data`;

  const pr = `<span class="health-dot amber"></span> PR #18 pending`;

  strip.innerHTML = [domain, botStatus, e2e, deploy, pr]
    .map((s, i) => `<div class="health-pill" style="animation-delay:${i * 50}ms">${s}</div>`)
    .join('');
}

function renderQA() {
  const list = document.getElementById('qa-list');
  list.innerHTML = QA.map((q, i) => `
    <div class="qa-row" style="animation-delay:${i * 50}ms">
      <span class="qa-date">${q.date}</span>
      <span class="qa-name">${q.name}</span>
      <span class="qa-badge ${q.result}">${q.result}</span>
      <span class="qa-runner">${q.runner}</span>
    </div>`).join('');
}

function renderProjects(projects) {
  const list = document.getElementById('project-list');
  if (!projects || !projects.length) { list.innerHTML = '<div style="padding:20px;color:var(--text3);font-size:13px;">No project data</div>'; return; }
  list.innerHTML = projects.map((p, i) => {
    const statusColor = p.status === 'Active' ? 'var(--green)' : p.status === 'Backburner' ? 'var(--amber)' : 'var(--text3)';
    const badgeBg = p.status === 'Active' ? 'rgba(48,209,88,0.12)' : p.status === 'Backburner' ? 'rgba(255,159,10,0.1)' : 'rgba(235,235,245,0.08)';
    return `
      <div class="project-row" style="animation-delay:${i * 60}ms">
        <div class="project-dot" style="background:${p.color || 'var(--text3)'}"></div>
        <div class="project-name">${p.name}</div>
        <div class="project-status-badge" style="color:${statusColor};background:${badgeBg}">${p.status}</div>
        <div class="project-desc">${p.description || ''}</div>
      </div>`;
  }).join('');
}

function renderIntel(intel) {
  const list = document.getElementById('intel-list');
  if (!intel || !intel.length) { list.innerHTML = '<div style="padding:20px;color:var(--text3);font-size:13px;">No intel</div>'; return; }
  list.innerHTML = intel.slice(0, 4).map((item, i) => {
    const d = new Date(item.date);
    const label = `${d.toLocaleString('en', {month:'short'})} ${d.getDate()}`;
    return `
      <div class="intel-row" style="animation-delay:${i * 60}ms">
        <span class="intel-date">${label}</span>
        <div class="intel-title">
          ${item.title}
          ${item.action ? `<div class="intel-action">${item.action}</div>` : ''}
        </div>
        <span class="impact-badge ${item.impact || 'medium'}">${(item.impact || 'med').toUpperCase()}</span>
      </div>`;
  }).join('');
}

function fmtDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return `${d.toLocaleString('en', {month:'short'})} ${d.getDate()}`;
}

function updateTimestamp(updatedAt) {
  const el = document.getElementById('last-updated');
  if (updatedAt) {
    const d = new Date(updatedAt);
    el.textContent = `Updated ${d.toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'})}`;
  } else {
    el.textContent = `Loaded ${new Date().toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'})}`;
  }
}

// ── LIVE CHECKS ─────────────────────────────────────────────────────────────

async function checkDomain() {
  try {
    const r = await fetch('https://forcrypto.market', { mode: 'no-cors', cache: 'no-store' });
    return true; // no-cors always succeeds if server responds
  } catch {
    return false;
  }
}

// ── MAIN ────────────────────────────────────────────────────────────────────

async function refreshData() {
  document.getElementById('last-updated').innerHTML = '<span class="spinner"></span>';
  try {
    const data = await fetchData();
    const domainLive = data.health && data.health.domain === 'live';
    updateTimestamp(data.updatedAt);
    renderAgents(data.agents);
    renderHealth(data.health || {}, domainLive);
    renderProjects(data.projects);
    renderIntel(data.intel);
  } catch (e) {
    document.getElementById('last-updated').textContent = 'Fetch failed';
    console.error(e);
  }
}

async function init() {
  // Render hardcoded sections immediately
  renderLaunchBar();
  renderWjpGrid();
  renderQA();

  // Fetch remote data
  await refreshData();

  // Auto-refresh every 60s
  setInterval(refreshData, 60_000);
}

init();
</script>
</body>
</html>
