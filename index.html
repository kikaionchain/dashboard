<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mission Control</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #070707;
    --bg2: #0f0f0f;
    --bg3: #161616;
    --border: #1e1e1e;
    --text: #e0e0e0;
    --muted: #666;
    --blue: #0057FF;
    --green: #00D68F;
    --gold: #F5A623;
    --red: #FF4444;
    --purple: #9945FF;
    --orange: #FF6B00;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }
  /* NAV */
  nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(7,7,7,0.95);
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  .nav-logo { font-weight: 700; font-size: 15px; color: #fff; letter-spacing: -0.3px; }
  .nav-logo span { color: var(--blue); }
  .nav-links { display: flex; gap: 4px; margin-left: auto; }
  .nav-links a {
    padding: 6px 12px;
    border-radius: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    transition: all 0.15s;
  }
  .nav-links a:hover, .nav-links a.active { color: #fff; background: var(--bg3); }
  .nav-links a.active { color: var(--blue); }
  /* LAYOUT */
  .page { display: none; padding: 24px 20px; max-width: 1100px; margin: 0 auto; }
  .page.active { display: block; }
  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 700px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }
  /* CARDS */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }
  /* STATUS DOTS */
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
  .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-yellow { background: var(--gold); }
  .dot-red { background: var(--red); }
  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    margin-top: 28px;
  }
  .section-header:first-child { margin-top: 0; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
  /* ARTIFACT CARDS */
  .artifact-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .artifact-card:hover { border-color: #333; }
  .artifact-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .artifact-type-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .type-Research { background: rgba(0,87,255,0.15); color: var(--blue); }
  .type-Brand { background: rgba(0,214,143,0.15); color: var(--green); }
  .type-Strategy { background: rgba(245,166,35,0.15); color: var(--gold); }
  .type-Video { background: rgba(153,69,255,0.15); color: var(--purple); }
  .type-Tool { background: rgba(255,107,0,0.15); color: var(--orange); }
  .artifact-title { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.3; }
  .artifact-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .artifact-preview {
    font-size: 12px;
    color: #444;
    font-style: italic;
    line-height: 1.4;
  }
  .artifact-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .artifact-date { font-size: 12px; color: #333; }
  .btn-view {
    display: inline-block;
    padding: 7px 16px;
    background: var(--blue);
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn-view:hover { opacity: 0.85; }
  /* FILTER TABS */
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-tab {
    padding: 6px 14px;
    border-radius: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-tab:hover { color: #fff; }
  .filter-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  /* FEED ITEMS */
  .feed-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
  }
  .feed-item:last-child { border-bottom: none; }
  .feed-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .feed-content { flex: 1; min-width: 0; }
  .feed-title { font-size: 13px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .feed-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .feed-arrow { color: #333; font-size: 16px; flex-shrink: 0; }
  /* PROJECT STATUS */
  .project-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .project-row:last-child { border-bottom: none; }
  .project-name { font-size: 13px; font-weight: 500; color: #fff; }
  .project-status { font-size: 12px; color: var(--muted); }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .badge-live { background: rgba(0,214,143,0.15); color: var(--green); }
  .badge-building { background: rgba(0,87,255,0.15); color: var(--blue); }
  .badge-testing { background: rgba(245,166,35,0.15); color: var(--gold); }
  /* AGENT STATUS */
  .agent-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .agent-row:last-child { border-bottom: none; }
  .agent-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  .agent-name { font-size: 13px; font-weight: 500; color: #fff; }
  .agent-role { font-size: 12px; color: var(--muted); }
  .agent-status { margin-left: auto; display: flex; align-items: center; font-size: 12px; color: var(--green); }
  /* NEEDS WJP */
  .needs-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .needs-item:last-child { border-bottom: none; }
  .needs-priority { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }
  .p-high { background: rgba(255,68,68,0.15); color: var(--red); }
  .p-medium { background: rgba(245,166,35,0.15); color: var(--gold); }
  .p-low { background: rgba(102,102,102,0.15); color: var(--muted); }
  /* ARTIFACT GALLERY GRID */
  .artifact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  /* UPDATED AT */
  .updated-at { font-size: 11px; color: #333; margin-top: 4px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">⌘ <span>Mission</span> Control</div>
  <div class="nav-links">
    <a href="#" class="active" onclick="showPage('home',this)">Home</a>
    <a href="#" onclick="showPage('artifacts',this)">Artifacts</a>
    <a href="#" onclick="showPage('projects',this)">Projects</a>
    <a href="#" onclick="showPage('intel',this)">Intel</a>
  </div>
</nav>

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="section-header" style="margin-top:0">
    <div>
      <div class="card-title" style="font-size:18px">Good morning, WJP.</div>
      <div class="updated-at" id="home-updated">Loading...</div>
    </div>
  </div>

  <!-- STATUS ROW -->
  <div class="grid-3" id="home-status-cards">
    <!-- populated by JS -->
  </div>

  <!-- KIKAI JUST BUILT -->
  <div class="section-header">
    <div class="section-title">Kikai just built</div>
    <a href="#" onclick="showPage('artifacts', document.querySelectorAll('.nav-links a')[1]); return false;" style="font-size:12px; color:var(--blue); text-decoration:none;">View all →</a>
  </div>
  <div class="card" style="padding:0 16px">
    <div id="recent-artifacts">Loading...</div>
  </div>

  <!-- NEEDS WJP -->
  <div class="section-header">
    <div class="section-title">Needs you</div>
  </div>
  <div class="card" style="padding: 0 16px" id="needs-wjp-list">
    <div style="padding:16px 0; color:var(--muted); font-size:13px">Loading...</div>
  </div>

  <!-- AGENTS -->
  <div class="section-header">
    <div class="section-title">Agents</div>
  </div>
  <div class="card" style="padding: 0 16px" id="agents-list">
    <div style="padding:16px 0; color:var(--muted); font-size:13px">Loading...</div>
  </div>
</div>

<!-- ARTIFACTS PAGE -->
<div id="page-artifacts" class="page">
  <div class="section-header" style="margin-top:0">
    <div class="section-title">All Artifacts</div>
    <div class="updated-at" id="artifacts-count"></div>
  </div>
  <div class="filter-tabs" id="filter-tabs">
    <div class="filter-tab active" onclick="filterArtifacts('All', this)">All</div>
    <div class="filter-tab" onclick="filterArtifacts('Research', this)">Research</div>
    <div class="filter-tab" onclick="filterArtifacts('Brand', this)">Brand</div>
    <div class="filter-tab" onclick="filterArtifacts('Strategy', this)">Strategy</div>
    <div class="filter-tab" onclick="filterArtifacts('Video', this)">Video</div>
    <div class="filter-tab" onclick="filterArtifacts('Tool', this)">Tool</div>
  </div>
  <div class="artifact-grid" id="artifact-grid">
    <div style="color:var(--muted); font-size:13px">Loading...</div>
  </div>
</div>

<!-- PROJECTS PAGE -->
<div id="page-projects" class="page">
  <div class="section-header" style="margin-top:0">
    <div class="section-title">Projects</div>
  </div>
  <div class="card" id="projects-list">
    <div style="color:var(--muted); font-size:13px">Loading...</div>
  </div>
</div>

<!-- INTEL PAGE -->
<div id="page-intel" class="page">
  <div class="section-header" style="margin-top:0">
    <div class="section-title">Intel Feed</div>
  </div>
  <div id="intel-list">
    <div style="color:var(--muted); font-size:13px">Loading...</div>
  </div>
</div>

<script>
let data = null;
let artifacts = null;
let currentFilter = 'All';

const TYPE_ICONS = {
  Research: '📄',
  Brand: '🎨',
  Strategy: '🧭',
  Video: '🎬',
  Tool: '🔧'
};

function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (el) el.classList.add('active');
}

function formatDate(d) {
  const date = new Date(d);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function timeAgo(d) {
  const now = new Date(), then = new Date(d);
  const diff = Math.floor((now - then) / 60000);
  if (diff < 60) return diff + 'm ago';
  if (diff < 1440) return Math.floor(diff/60) + 'h ago';
  return Math.floor(diff/1440) + 'd ago';
}

function renderHome() {
  if (!data) return;

  document.getElementById('home-updated').textContent = 'Updated ' + timeAgo(data.updatedAt);

  // Status cards
  const projects = data.projects || [];
  const live = projects.filter(p => p.status === 'live').length;
  const building = projects.filter(p => p.status !== 'live').length;
  const needsCount = (data.needsWjp || []).length;
  const agentsOnline = (data.agents || []).filter(a => a.status === 'online').length;

  document.getElementById('home-status-cards').innerHTML = `
    <div class="card">
      <div class="card-label">Projects</div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <span style="font-size:28px;font-weight:700;color:#fff">${projects.length}</span>
        <span style="color:var(--green);font-size:12px">${live} live</span>
      </div>
      <div class="card-sub">${building} in dev</div>
    </div>
    <div class="card">
      <div class="card-label">Needs You</div>
      <div style="font-size:28px;font-weight:700;color:${needsCount > 0 ? 'var(--gold)' : '#fff'}">${needsCount}</div>
      <div class="card-sub">${needsCount > 0 ? 'items waiting' : 'all clear'}</div>
    </div>
    <div class="card">
      <div class="card-label">Agents</div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <span style="font-size:28px;font-weight:700;color:#fff">${(data.agents||[]).length}</span>
        <span style="color:var(--green);font-size:12px">${agentsOnline} online</span>
      </div>
      <div class="card-sub">Kikai + Yama</div>
    </div>
  `;
}

function renderRecentArtifacts() {
  if (!artifacts) return;
  const recent = [...artifacts.artifacts]
    .sort((a,b) => b.date.localeCompare(a.date))
    .slice(0, 5);

  const html = recent.map(a => `
    <a class="feed-item" href="${a.url}" target="_blank">
      <div class="feed-icon" style="background:rgba(0,87,255,0.1)">${TYPE_ICONS[a.type] || '📄'}</div>
      <div class="feed-content">
        <div class="feed-title">${a.title}</div>
        <div class="feed-meta"><span class="artifact-type-badge type-${a.type}" style="font-size:10px;padding:2px 6px">${a.type}</span> · ${formatDate(a.date)}</div>
      </div>
      <div class="feed-arrow">›</div>
    </a>
  `).join('');

  document.getElementById('recent-artifacts').innerHTML = html;
  document.getElementById('artifacts-count').textContent = artifacts.artifacts.length + ' total';
}

function renderArtifactGrid(filter) {
  if (!artifacts) return;
  const list = filter === 'All'
    ? artifacts.artifacts
    : artifacts.artifacts.filter(a => a.type === filter);

  const sorted = [...list].sort((a,b) => b.date.localeCompare(a.date));

  if (!sorted.length) {
    document.getElementById('artifact-grid').innerHTML = '<div style="color:var(--muted);font-size:13px;grid-column:1/-1">No artifacts of this type yet.</div>';
    return;
  }

  document.getElementById('artifact-grid').innerHTML = sorted.map(a => `
    <div class="artifact-card">
      <div class="artifact-header">
        <div class="artifact-title">${a.title}</div>
        <span class="artifact-type-badge type-${a.type}">${a.type}</span>
      </div>
      <div class="artifact-desc">${a.description}</div>
      ${a.preview ? `<div class="artifact-preview">${a.preview}</div>` : ''}
      <div class="artifact-footer">
        <div class="artifact-date">${formatDate(a.date)}</div>
        <a class="btn-view" href="${a.url}" target="_blank">View →</a>
      </div>
    </div>
  `).join('');
}

function filterArtifacts(type, el) {
  currentFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderArtifactGrid(type);
}

function renderProjects() {
  if (!data || !data.projects) return;
  const statusMap = { live: 'badge-live', testing: 'badge-testing', building: 'badge-building', paused: '' };
  document.getElementById('projects-list').innerHTML = data.projects.map(p => `
    <div class="project-row">
      <div>
        <div class="project-name">${p.name}</div>
        <div class="project-status">${p.description || ''}</div>
      </div>
      <span class="badge ${statusMap[p.status] || 'badge-building'}">${p.status}</span>
    </div>
  `).join('');
}

function renderAgents() {
  if (!data || !data.agents) return;
  document.getElementById('agents-list').innerHTML = data.agents.map(a => `
    <div class="agent-row">
      <img class="agent-avatar" src="${a.avatar || ''}" onerror="this.style.display='none'">
      <div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-role">${a.role || ''}</div>
      </div>
      <div class="agent-status">
        <span class="dot ${a.status === 'online' ? 'dot-green' : 'dot-yellow'}"></span>
        ${a.status}
      </div>
    </div>
  `).join('');
}

function renderNeedsWjp() {
  if (!data) return;
  const items = data.needsWjp || [];
  if (!items.length) {
    document.getElementById('needs-wjp-list').innerHTML = '<div style="padding:16px 0;color:var(--muted);font-size:13px">Nothing pending — all clear.</div>';
    return;
  }
  document.getElementById('needs-wjp-list').innerHTML = items.map(i => `
    <div class="needs-item">
      <span class="needs-priority p-${i.priority || 'medium'}">${i.priority || 'medium'}</span>
      <div>
        <div style="font-size:13px;font-weight:500;color:#fff">${i.title}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${i.description || ''}</div>
      </div>
    </div>
  `).join('');
}

function renderIntel() {
  if (!data || !data.intel) return;
  const items = Array.isArray(data.intel) ? data.intel : (data.intel.items || []);
  document.getElementById('intel-list').innerHTML = items.slice(0, 20).map(i => `
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px">
        <div class="card-title" style="font-size:14px">${i.title || i.headline || ''}</div>
        <div style="font-size:11px;color:var(--muted);white-space:nowrap">${i.date ? formatDate(i.date) : ''}</div>
      </div>
      <div class="card-sub">${i.summary || i.description || ''}</div>
      ${i.url ? `<a href="${i.url}" target="_blank" style="font-size:12px;color:var(--blue);margin-top:8px;display:inline-block">Read →</a>` : ''}
    </div>
  `).join('');
}

async function loadAll() {
  try {
    const [dataRes, artifactsRes] = await Promise.all([
      fetch('data.json?t=' + Date.now()),
      fetch('artifacts.json?t=' + Date.now())
    ]);
    data = await dataRes.json();
    artifacts = await artifactsRes.json();
  } catch(e) {
    try { data = await (await fetch('data.json')).json(); } catch(e2) {}
    try { artifacts = await (await fetch('artifacts.json')).json(); } catch(e2) {}
  }

  renderHome();
  renderRecentArtifacts();
  renderArtifactGrid('All');
  renderProjects();
  renderAgents();
  renderNeedsWjp();
  renderIntel();
}

loadAll();
</script>
</body>
</html>
